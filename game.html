<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Partida - Física en 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <main id="app">
        <header class="game-header">
            <div id="player-tag" class="user-status" style="display: inline-block; margin: 0; padding: 0.5rem 1rem;">
                <span id="game-nickname">Jugador</span>
            </div>
            <div class="streak-counter">
                Racha: <span id="streak-val">0</span> | Best: <span id="best-val">0</span>
            </div>
        </header>

        <div class="timer-container border-glow">
            <div id="timer-bar" class="timer-bar"></div>
            <div id="timer-text" style="position: absolute; right: 10px; top: -25px; font-size: 0.9rem; color: var(--neon-blue); font-weight: 700;">10s</div>
        </div>

        <section class="question-card" id="question-text">
            Cargando pregunta...
        </section>

        <div class="options-container" id="options-grid">
            <!-- Opciones se cargarán por JS -->
            <button class="option-btn">Opción 1</button>
            <button class="option-btn">Opción 2</button>
            <button class="option-btn">Opción 3</button>
            <button class="option-btn">Opción 4</button>
        </div>

        <div style="margin-top: 2rem;">
            <button onclick="window.location.href='index.html'" class="btn-secondary" style="border:none; background:transparent; font-size: 0.8rem; opacity: 0.5; cursor:pointer;">
                Abandonar partida
            </button>
        </div>
    </main>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="neon-text-red">¡TIEMPO AGOTADO!</h2>
            <div class="final-stats">
                <div class="stat-box">
                    <span>Puntaje Total</span>
                    <strong id="final-score">0</strong>
                </div>
                <div class="stat-box">
                    <span>Mejor Racha</span>
                    <strong id="final-streak">0</strong>
                </div>
            </div>
            <div class="modal-actions">
                <button id="btn-restart" class="btn btn-primary">Volver a jugar</button>
                <button id="btn-home" class="btn btn-secondary">Inicio</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="game.js"></script>
</body>
</html>
