<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Física - Física en 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">
    <style>
        /* ── Game page overrides ── */
        body {
            /* Allow scrolling if content overflows on very small screens */
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
            align-items: flex-start;
        }

        #app {
            height: auto;
            min-height: 100vh;
            justify-content: flex-start;
            padding: 0.8rem 1rem 1.5rem;
            gap: 0;
        }

        /* Header compacto */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        /* Timer más compacto */
        .timer-container {
            margin-bottom: 0.8rem;
            flex-shrink: 0;
        }

        /* Sección pregunta + opciones: ocupa el espacio disponible */
        .question-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            flex: 1;
        }

        /* Caja del texto de pregunta: más compacta */
        #question-text {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Grid de opciones */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            width: 100%;
        }

        /* Botones de opción más compactos en móvil */
        .option-btn {
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            border-radius: 14px;
            min-height: 52px;
        }

        /* Responsive para pantallas muy pequeñas */
        @media (max-height: 680px) {
            #question-text {
                font-size: 0.9rem;
                padding: 0.7rem 1rem;
                min-height: 60px;
            }
            .option-btn {
                padding: 0.7rem 0.8rem;
                font-size: 0.88rem;
                min-height: 44px;
            }
            .timer-container { margin-bottom: 0.5rem; }
            .options-grid { gap: 0.45rem; }
        }

        @media (max-height: 580px) {
            .option-btn {
                padding: 0.55rem 0.8rem;
                font-size: 0.82rem;
                min-height: 38px;
                border-radius: 10px;
            }
            #question-text {
                font-size: 0.85rem;
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Botón de Música -->
    <div id="music-control" class="music-fab">
        <button id="music-toggle" aria-label="Toggle Music">
            <span class="icon">🔊</span>
        </button>
    </div>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <!-- Pantalla de Inicio de Partida -->
    <div id="start-overlay" class="modal-overlay">
        <div class="modal-content border-glow">
            <h2 style="color: var(--neon-blue);">¿LISTO PARA LA MISIÓN?</h2>
            <p style="margin-top:0.5rem; color:var(--neon-green); font-weight:bold;">Selecciona tu área de especialización:</p>
            <div id="category-selector" style="display: flex; flex-direction: column; gap: 0.8rem; margin: 1rem 0;">
                <button class="btn btn-secondary category-btn" data-tema="Aleatorio" style="padding: 0.8rem; font-size: 0.9rem; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);">✨ Aleatorio (Todos los Temas)</button>
                <button class="btn btn-secondary category-btn" data-tema="Pascal" style="padding: 0.8rem; font-size: 0.9rem;">Principio de Pascal</button>
                <button class="btn btn-secondary category-btn" data-tema="Arquímedes" style="padding: 0.8rem; font-size: 0.9rem;">Principio de Arquímedes</button>
                <button class="btn btn-secondary category-btn" data-tema="Energía" style="padding: 0.8rem; font-size: 0.9rem;">Energía (Mecánica, Cinética, Potencial)</button>
                <button class="btn btn-secondary category-btn" data-tema="Electricidad" style="padding: 0.8rem; font-size: 0.9rem;">Electricidad y Energías</button>
                <button class="btn btn-secondary category-btn" data-tema="Electromagnetismo" style="padding: 0.8rem; font-size: 0.9rem;">Electromagnetismo y Espectro</button>
                <button class="btn btn-secondary category-btn" data-tema="Universo" style="padding: 0.8rem; font-size: 0.9rem;">El Universo y su Origen</button>
                <button class="btn btn-secondary category-btn" data-tema="Pensamiento Científico" style="padding: 0.8rem; font-size: 0.9rem;">El Pensamiento Científico</button>
                <button class="btn btn-secondary category-btn" data-tema="Unidades y Medidas" style="padding: 0.8rem; font-size: 0.9rem;">Unidades y Medidas</button>
                <button class="btn btn-secondary category-btn" data-tema="Características de la Materia" style="padding: 0.8rem; font-size: 0.9rem;">Estructura y Características de la Materia</button>
                <button class="btn btn-secondary category-btn" data-tema="Estados de la Materia" style="padding: 0.8rem; font-size: 0.9rem;">Estados de Agregación de la Materia</button>
                <button class="btn btn-secondary category-btn" data-tema="Fuerza y Movimiento" style="padding: 0.8rem; font-size: 0.9rem;">Fuerza y Movimiento</button>
            </div>

            <!-- EXAMEN ESPECIAL — visible para alumnos logueados de 2A y 2B -->
            <div id="exam-special-section" style="display:none; width:100%; border-top: 1px solid rgba(255,180,0,0.2); padding-top: 1rem; margin-top: 0.5rem;">
                <p style="font-size:0.65rem;color:rgba(255,180,0,0.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:0.6rem;">⚡ Evaluación especial</p>
                <a href="examen.html" id="btn-special-exam"
                   style="display:flex;align-items:center;justify-content:center;gap:0.5rem;
                          width:100%;padding:0.85rem;border-radius:16px;
                          background:linear-gradient(135deg,rgba(255,180,0,0.12),rgba(255,107,0,0.12));
                          border:1.5px solid rgba(255,180,0,0.5);color:#ffb400;
                          font-family:inherit;font-size:0.9rem;font-weight:900;
                          text-decoration:none;text-transform:uppercase;letter-spacing:1px;
                          transition:all 0.3s;cursor:pointer;
                          box-shadow:0 0 15px rgba(255,180,0,0.15);"
                   onmouseover="this.style.background='linear-gradient(135deg,rgba(255,180,0,0.25),rgba(255,107,0,0.25))';this.style.boxShadow='0 0 25px rgba(255,180,0,0.4)';"
                   onmouseout="this.style.background='linear-gradient(135deg,rgba(255,180,0,0.12),rgba(255,107,0,0.12))';this.style.boxShadow='0 0 15px rgba(255,180,0,0.15)';"
                >
                    📝 EXAMEN ESPECIAL <span id="exam-group-tag" style="font-size:0.7rem;opacity:0.7;"></span>
                </a>
            </div>

            <p style="font-size: 0.8rem; opacity: 0.8; margin-top: 0.8rem;">Tienes 10 segundos por pregunta. La racha más larga gana.</p>
            <button id="btn-real-start" class="btn btn-primary" style="margin-top: 1.5rem;" disabled>¡COMENZAR AHORA!</button>
        </div>
    </div>

    <main id="app">
        <a href="index.html" class="back-btn">←</a>
        <header class="game-header">
            <div id="player-tag" class="user-status" style="display: inline-block; margin: 0; padding: 0.5rem 1rem;">
                <span id="game-nickname">Jugador</span>
            </div>
            <div class="stats-container">
                <div class="stat">
                    <span class="stat-label">RACHA</span>
                    <span id="streak-val" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">RÉCORD</span>
                    <span id="best-val" class="stat-value">0</span>
                </div>
            </div>
        </header>

        <div class="timer-container">
            <div id="timer-bar" class="timer-bar"></div>
            <span id="timer-text" class="timer-text">10s</span>
            <span id="q-progress" style="
                font-size:0.65rem;
                color:rgba(0,242,255,0.6);
                font-weight:700;
                letter-spacing:1px;
                margin-left:0.8rem;
            ">0 / 0 ✓</span>
        </div>

        <section class="question-container border-glow">
            <p id="question-text">Preparando motores cuánticos...</p>
            <div id="options-grid" class="options-grid">
                <!-- Opciones se generan dinámicamente -->
            </div>
        </section>
    </main>

    <!-- Modal de Fin de Juego -->
    <div id="game-over-modal" class="modal-overlay hidden">
        <div class="modal-content border-glow">
            <h2>¡MISIÓN TERMINADA!</h2>
            <p class="modal-subtitle" style="
                font-size:0.9rem;
                color:var(--neon-green);
                margin-top:0.3rem;
                min-height:1.2em;
            "></p>
            <div class="final-stats">
                <div class="final-stat">
                    <span>Correctas:</span>
                    <span id="final-score">0</span>
                </div>
                <div class="final-stat">
                    <span>Racha Máxima:</span>
                    <span id="final-streak">0</span>
                </div>
            </div>
            <div class="modal-actions">
                <button id="btn-restart" class="btn btn-primary">REINTENTAR</button>
                <button id="btn-change-topic" class="btn btn-primary" style="display:none;">CAMBIAR TEMA</button>
                <button id="btn-reset-topic" class="btn btn-secondary" style="display:none; border-color:#ff4444; color:#ff4444;">REINICIAR TEMA</button>
                <button id="btn-home" class="btn btn-secondary">INICIO</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="music.js"></script>
    <script src="mission.js?v=7.0"></script>
    <script>
        // Mostrar botón Examen Especial si hay un alumno logueado
        // El control de acceso real (grado 2, grupo A/B) lo maneja examen.js
        (function() {
            var nick = localStorage.getItem('user');
            if (nick) {
                var section = document.getElementById('exam-special-section');
                if (section) section.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
