<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Física en 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <main id="app" style="height: auto; padding: 2rem 1rem;">
        <h2 class="view-title">Crear Perfil</h2>

        <form id="register-form" class="form-container">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan Pérez" required>
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label for="grado">Grado</label>
                    <select id="grado" class="form-control" required>
                        <option value="">Selecciona</option>
                        <option value="1">1°</option>
                        <option value="2">2°</option>
                        <option value="3">3°</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="grupo">Grupo</label>
                    <input type="text" id="grupo" class="form-control" placeholder="Ej. A" maxlength="1" required>
                </div>
            </div>

            <div class="form-group">
                <label for="nickname">Nickname</label>
                <input type="text" id="nickname" class="form-control" placeholder="Min. 3 caracteres" required>
            </div>

            <div class="form-group">
                <label>Elige tu Avatar (Brainrot Style)</label>
                <div class="avatar-grid" id="avatar-selector">
                    <div class="avatar-option" data-avatar="avatar1.png">
                        <img src="public/avatars/avatar1.png" alt="Avatar 1">
                    </div>
                    <div class="avatar-option" data-avatar="avatar2.png">
                        <img src="public/avatars/avatar2.png" alt="Avatar 2">
                    </div>
                    <div class="avatar-option" data-avatar="avatar3.png">
                        <img src="public/avatars/avatar3.png" alt="Avatar 3">
                    </div>
                    <div class="avatar-option" data-avatar="avatar4.png">
                        <img src="public/avatars/avatar4.png" alt="Avatar 4">
                    </div>
                </div>
                <input type="hidden" id="selected-avatar" required>
            </div>

            <button type="submit" id="btn-save" class="btn btn-primary" style="margin-top: 1rem;">
                Guardar Perfil
            </button>

            <a href="index.html" class="back-link">Cancelar</a>
        </form>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="register.js"></script>
</body>
</html>
