<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Física en 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: auto;
            min-height: 100vh;
            overflow-y: auto;
            padding: 2rem 0;
        }
        #app {
            max-width: 800px;
            height: auto;
            justify-content: flex-start;
        }
        .admin-container {
            width: 100%;
            margin-top: 2rem;
        }
        .admin-table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-top: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 1.2rem;
            border-bottom: 1px solid var(--glass-border);
        }
        th {
            color: var(--neon-blue);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .delete-btn {
            background: rgba(255, 68, 68, 0.1);
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 10px var(--neon-red);
        }
        .bulk-actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .filter-group select {
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }
        .admin-header {
            margin-bottom: 3rem;
        }
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
        }
        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 0.7rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .stat-card p {
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
        }
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: var(--neon-red);
        }
        #login-view {
            max-width: 400px;
            margin: 10vh auto;
        }
        .group-badge {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue);
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <a href="index.html" class="back-btn">←</a>

    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="form-container">
            <h2 class="view-title">Acceso Admin</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="admin-email" class="form-control" required placeholder="zlagustin10@gmail.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="admin-password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Entrar al Sistema</button>
            </form>
        </div>

        <!-- Dashboard View (Hidden by default) -->
        <div id="dashboard-view" class="admin-container hidden">
            <button id="logout-btn" class="logout-btn">Cerrar Sesión</button>
            
            <div class="admin-header">
                <h1 class="view-title">Panel de Control</h1>
                <p class="hero-subtitle">Gestión de Alumnos</p>
            </div>

            <div class="stats-summary">
                <div class="stat-card">
                    <h3>Total Alumnos</h3>
                    <p id="total-students">0</p>
                </div>
                <div class="stat-card">
                    <h3>Grados</h3>
                    <p id="total-grades">-</p>
                </div>
            </div>

            <div class="bulk-actions">
                <div class="filter-group">
                    <label>Eliminar por Grupo:</label>
                    <select id="delete-grade-select">
                        <option value="">Grado</option>
                        <option value="1">1°</option>
                        <option value="2">2°</option>
                        <option value="3">3°</option>
                    </select>
                    <select id="delete-group-select">
                        <option value="">Grupo</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                    </select>
                    <button id="bulk-delete-btn" class="delete-btn">Eliminar Grupo</button>
                </div>
            </div>

            <div class="admin-table-container">
                <table id="students-table">
                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Grado/Grupo</th>
                            <th>Correo</th>
                            <th>Mejor Racha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="students-body">
                        <!-- Content loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
