<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Galáctico - Física en 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <main id="app" style="height: auto; min-height: 100vh; padding-top: 80px;">
        <a href="index.html" class="back-btn">←</a>
        <h2 class="view-title" style="margin-bottom: 1rem;">HALL OF FAME</h2>

        <div class="tabs-container">
            <button class="tab-btn active" data-filter="global">GLOBAL</button>
            <button class="tab-btn" data-filter="grado">GRADO</button>
            <button class="tab-btn" data-filter="grupo">GRUPO</button>
        </div>

        <div id="filter-display" style="font-size: 0.8rem; margin-bottom: 1.5rem; color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue);"></div>

        <div id="leaderboard-container" class="leaderboard-list">
            <div class="loading-spinner">Cargando base de datos...</div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="leaderboard.js"></script>
</body>
</html>
