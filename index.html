<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Física en 10 - El Desafío</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
    <style>
        /* ── Pantalla principal: responsive para móviles ── */
        body {
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
            align-items: flex-start;
        }

        #app {
            height: auto;
            min-height: 100vh;
            justify-content: center;
            padding: 1.5rem 1.5rem 2rem;
            gap: 0;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        /* Imagen del héroe más pequeña en móviles */
        .hero-image-container {
            width: 120px;
            height: 120px;
            margin-bottom: 0.8rem;
        }

        .hero-title {
            font-size: clamp(2.2rem, 12vw, 4rem);
            margin-top: 0;
        }

        .hero-subtitle {
            font-size: clamp(0.75rem, 3.5vw, 1.2rem);
            margin-top: 0.5rem;
        }

        /* Botones más compactos */
        .controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 0;
        }

        .btn {
            padding: 1rem;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
        }

        /* Pantallas muy pequeñas (iPhone SE: 667px alto) */
        @media (max-height: 680px) {
            .hero-image-container { width: 90px; height: 90px; }
            .hero-title  { font-size: clamp(1.8rem, 10vw, 3rem); }
            .controls    { gap: 0.55rem; }
            .btn         { padding: 0.8rem; }
            header       { margin-bottom: 1rem; }
        }

        @media (max-height: 580px) {
            .hero-image-container { width: 70px; height: 70px; }
            .hero-subtitle        { display: none; }
            .btn                  { padding: 0.65rem; font-size: 0.82rem; }
            .controls             { gap: 0.45rem; }
            header                { margin-bottom: 0.8rem; }
        }
    </style>
</head>
<body>
    <!-- Botón de Música -->
    <div id="music-control" class="music-fab">
        <button id="music-toggle" aria-label="Toggle Music">
            <span class="icon">🔊</span>
        </button>
    </div>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <main id="app">
        <header>
            <div class="hero-image-container">
                <img src="hero-atom.png" alt="Átomo Neón" class="hero-atom-anim">
            </div>
            <h1 class="hero-title">FÍSICA<br>EN 10</h1>
            <p class="hero-subtitle">DESAFÍO INTERGALÁCTICO</p>

        </header>

        <div class="controls">
            <button class="btn btn-primary" id="btn-start">
                <span>INICIAR MISIÓN</span>
            </button>
            <button class="btn btn-secondary" id="btn-leaderboard">
                <span>RANKING GLOBAL</span>
            </button>
            <button class="btn btn-secondary" id="btn-register">
                <span>REGISTRAR PERFIL</span>
            </button>
            <a href="admin.html" class="btn btn-admin" id="btn-admin">
                <span>🛡 ADMINISTRADOR</span>
            </a>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="music.js"></script>
    <script src="main.js"></script>
    <!-- 
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error SW', err));
            });
        }
    </script>
    -->
</body>
</html>
