<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Física en 10 - El Desafío</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <div class="glow-orb orb-top"></div>
    <div class="glow-orb orb-bottom"></div>

    <main id="app">
        <header>
            <h1 class="hero-title">FÍSICA<br>EN 10</h1>
            <p class="hero-subtitle">DESAFÍO INTERGALÁCTICO</p>
            <div id="user-display" class="user-status">
                Bienvenido, <span id="current-nickname">...</span>
            </div>
        </header>

        <div class="controls">
            <a href="game.html" class="btn btn-primary" id="play-btn">
                <span>INICIAR MISIÓN</span>
            </a>
            <a href="leaderboard.html" class="btn btn-secondary">
                <span>RANKING GLOBAL</span>
            </a>
            <a href="register.html" class="btn btn-secondary" id="register-btn">
                <span>REGISTRAR PILOTO</span>
            </a>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error SW', err));
            });
        }
    </script>
</body>
</html>
